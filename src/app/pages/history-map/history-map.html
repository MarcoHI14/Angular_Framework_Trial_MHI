<app-timeline id="timeline-section"></app-timeline>

<app-park-map id="map-section"></app-park-map>

<section class="history-video" aria-labelledby="history-video-title">
  <div class="history-video__container">
    <h2 id="history-video-title">Revive Tivoli World en vídeo</h2>
    <div class="history-video__frame-wrapper">
      <iframe
        src="https://www.youtube-nocookie.com/embed/SEaTZIC4FME"
        title="Video de Tivoli World"
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</section>

<app-mini-player></app-mini-player>
