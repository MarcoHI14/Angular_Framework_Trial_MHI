<div class="player">

  <!-- Imagen a la izquierda -->
  <div class="cover-container">
    <img src="assets/images/Tivoli.png" alt="Tivoli" class="cover">
  </div>

  <!-- Zona derecha -->
  <div class="content">

    <div class="track-info">
      <h2>{{ currentTrack.title }}</h2>
      <p>{{ currentTrack.artist }}</p>
    </div>

    <!-- Barra de progreso -->
    <div class="progress-container">
      <span>{{ formatTime((currentTime$ | async) || 0) }}</span>

      <input
        type="range"
        min="0"
        [max]="(duration$ | async) || 0"
        [value]="(currentTime$ | async) || 0"
        (input)="seek(+$event.target.value)"
        class="progress-bar"
        [style.--progress]="getProgress((currentTime$ | async) || 0, (duration$ | async) || 0) + '%'"
        aria-label="Barra de progreso de la canción"
      >

      <span>{{ formatTime((duration$ | async) || 0) }}</span>
    </div>

    <!-- Controles -->
    <div class="controls">
      <button (click)="previous()" aria-label="Canción anterior">⏮</button>

      <button class="play-btn" (click)="togglePlay()" [attr.aria-label]="(isPlaying$ | async) ? 'Pausar' : 'Reproducir'">
        {{ (isPlaying$ | async) ? '⏸' : '▶' }}
      </button>

      <button (click)="next()" aria-label="Siguiente canción">⏭</button>

      <!-- Control de Volumen en la misma fila -->
      <div class="volume-controls">
        <button class="volume-btn" (click)="toggleMute()" [attr.aria-label]="(isMuted$ | async) ? 'Activar sonido' : 'Silenciar'">
          {{ (isMuted$ | async) ? '🔇' : (((volume$ | async) || 0) > 0.5 ? '🔊' : (((volume$ | async) || 0) > 0 ? '🔉' : '🔈')) }}
        </button>

        <input
          type="range"
          min="0"
          max="1"
          step="0.01"
          [value]="(volume$ | async) || 1"
          (input)="changeVolume($event)"
          class="volume-bar"
          [style.--volume]="(((volume$ | async) || 1) * 100) + '%'"
          aria-label="Control de volumen"
        >

        <span class="volume-percentage">{{ (((volume$ | async) || 1) * 100).toFixed(0) }}%</span>
      </div>
    </div>

    <!-- Playlist Visual -->
    <div class="playlist-container">
      <div class="playlist-header" (click)="togglePlaylist()">
        <h3>Playlist</h3>
        <button class="playlist-toggle" (click)="togglePlaylist(); $event.stopPropagation()" [attr.aria-label]="showPlaylist ? 'Ocultar playlist' : 'Mostrar playlist'" [attr.aria-expanded]="showPlaylist">
          {{ showPlaylist ? '▼' : '▶' }}
        </button>
      </div>

      <div class="playlist" *ngIf="showPlaylist">
        <button
          class="playlist-item"
          *ngFor="let track of playlist; let i = index"
          [class.active]="i === (currentTrackIndex$ | async)"
          (click)="playTrack(i)"
          [attr.aria-label]="'Reproducir ' + track.title + ' de ' + track.artist">
          <span class="track-number">{{ i + 1 }}</span>
          <div class="track-details">
            <div class="track-title">{{ track.title }}</div>
            <div class="track-artist">{{ track.artist }}</div>
          </div>
          <span class="play-indicator" *ngIf="i === (currentTrackIndex$ | async)" aria-hidden="true">▶</span>
        </button>
      </div>
    </div>

  </div>

</div>
