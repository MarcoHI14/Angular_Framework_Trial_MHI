<div class="chatbot-container">
  <!-- Botón flotante -->
  <button class="chat-button" (click)="toggleChat()" [class.active]="isOpen">
    <span *ngIf="!isOpen">💬</span>
    <span *ngIf="isOpen">✕</span>
  </button>

  <!-- Ventana de chat -->
  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <div class="header-content">
        <div class="bot-avatar">🤖</div>
        <div>
          <div class="bot-name">Asistente Tivoli</div>
          <div class="bot-status">En línea</div>
        </div>
      </div>
      <button class="minimize-btn" (click)="toggleChat()">−</button>
    </div>

    <div class="chat-body">
      <div class="message" *ngFor="let message of messages" [class.user-message]="message.isUser">
        <div class="message-content">
          {{ message.text }}
        </div>
        <div class="message-time">{{ message.timestamp | date:'HH:mm' }}</div>
      </div>

      <!-- Indicador escribiendo -->
      <div class="typing-indicator" *ngIf="isTyping">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Opciones FAQ -->
      <div class="faq-options" *ngIf="messages.length <= 2">
        <button class="faq-btn" *ngFor="let faq of faqs" (click)="selectFAQ(faq)">
          {{ faq.question }}
        </button>
      </div>
    </div>

    <div class="chat-footer">
      <input
        type="text"
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        placeholder="Escribe tu pregunta..."
        class="chat-input">
      <button class="send-btn" (click)="sendMessage()">
        ➤
      </button>
    </div>
  </div>
</div>
