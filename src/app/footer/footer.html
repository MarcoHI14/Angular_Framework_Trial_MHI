<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-section">
        <h3>Tivoli World</h3>
        <p>El parque temático más emblemático de la Costa del Sol desde 1972</p>
      </div>

      <div class="footer-section">
        <h4>Enlaces Rápidos</h4>
        <ul>
          <li><a href="#about">Sobre Nosotros</a></li>
          <li><a href="#attractions">Atracciones</a></li>
          <li><a href="#gallery">Galería</a></li>
          <li><a href="#info">Información</a></li>
        </ul>
      </div>

      <div class="footer-section footer-social">
        <h4>Síguenos</h4>
        <div class="social-links">
          <a href="#" class="social-icon">📘</a>
          <a href="#" class="social-icon">📷</a>
          <a href="#" class="social-icon">🐦</a>
          <a href="#" class="social-icon">▶️</a>
        </div>
      </div>

      <div class="footer-section footer-qr">
        <h4>Escanea el QR</h4>
        <button class="qr-trigger" type="button" (click)="openQr()" aria-label="Ampliar codigo QR">
          <img src="assets/images/qr-watch-now.png" alt="Codigo QR para ver contenido" class="qr-thumb">
        </button>
      </div>
    </div>

    <div class="footer-bottom">
      <p class="footer-meta">© 2026 Tivoli World — Proyecto Angular Framework · Desarrollado en la UEx</p>
    </div>
  </div>

  <div class="qr-modal" *ngIf="isQrOpen" (click)="closeQr()">
    <div class="qr-modal-content" (click)="$event.stopPropagation()">
      <button class="qr-close" type="button" (click)="closeQr()" aria-label="Cerrar QR ampliado">✕</button>
      <img src="assets/images/qr-watch-now.png" alt="Codigo QR ampliado" class="qr-large">
    </div>
  </div>
</footer>
