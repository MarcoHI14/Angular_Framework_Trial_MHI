<section class="gallery-section">
  <div class="container">
    <h2 class="scroll-animate">Galería de Recuerdos</h2>
    <p class="subtitle scroll-animate">Momentos mágicos capturados en Tivoli World</p>

    <div class="gallery-grid">
      <div class="gallery-item scroll-animate" *ngFor="let img of images; let i = index" (click)="openModal(i)">
        <img [src]="img.url" [alt]="img.title">
        <div class="gallery-overlay">
          <span>{{ img.title }}</span>
        </div>
      </div>
    </div>
  </div>
</section>

<app-gallery-modal
  [images]="images"
  [isOpen]="isModalOpen"
  [currentIndex]="currentImageIndex"
  (close)="closeModal()">
</app-gallery-modal>
