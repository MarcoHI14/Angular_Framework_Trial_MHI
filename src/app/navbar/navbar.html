<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="navbar-container">
    <div class="navbar-brand">
      <a (click)="navigateTo('')" style="cursor: pointer;">🎢 Tivoli World</a>
    </div>

    <!-- Menu Desktop -->
    <ul class="navbar-menu">
      <li><a (click)="navigateTo('')">Inicio</a></li>
      <li><a (click)="navigateTo('historia-mapa')">Historia y Mapa</a></li>
      <li><a (click)="navigateTo('planificacion-reserva')">Planificación y Reserva</a></li>
    </ul>

    <!-- Theme Toggle + Hamburger Menu -->
    <div class="navbar-actions">
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
        {{ isDarkMode ? '☀️' : '🌙' }}
      </button>

      <button class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen" [attr.aria-expanded]="isMenuOpen" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMenuOpen" [attr.aria-hidden]="!isMenuOpen">
    <ul class="mobile-menu-list">
      <li><a (click)="navigateTo('')">Inicio</a></li>
      <li><a (click)="navigateTo('historia-mapa')">Historia y Mapa</a></li>
      <li><a (click)="navigateTo('planificacion-reserva')">Planificación y Reserva</a></li>
    </ul>
  </div>
</nav>
